<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Companion - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }

        .alert-success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 300px;
        }

        .dashboard h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .user-info {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .user-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .user-info strong {
            color: #333;
        }

        .logout-btn {
            background: #e74c3c;
            width: 100%;
            padding: 10px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Travel Companion</h1>
        <p class="subtitle">Explore the world together</p>

        <!-- Login Form -->
        <div id="loginForm">
            <div id="loginAlert"></div>
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button id="loginBtn" onclick="handleLogin()">Login</button>
            <div class="toggle-link">
                Don't have account? <a onclick="toggleForms('register')">Register here</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div id="registerAlert"></div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label for="regPassword2">Confirm Password</label>
                <input type="password" id="regPassword2" placeholder="Confirm password">
            </div>
            <button id="registerBtn" onclick="handleRegister()">Register</button>
            <div class="toggle-link">
                Already have account? <a onclick="toggleForms('login')">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8000/api';

        // Toggle between login and register forms
        function toggleForms(form) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (form === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
            }
        }

        // Show alert message
        function showAlert(formType, message, isError = true) {
            const alertElement = document.getElementById(formType === 'login' ? 'loginAlert' : 'registerAlert');
            alertElement.textContent = message;
            alertElement.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
        }

        // Handle login
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showAlert('login', 'Please enter username and password', true);
                return;
            }

            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span>Logging in...';

            try {
                const response = await fetch(`${BACKEND_URL}/users/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.access) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('login', 'Login successful! Redirecting...', false);
                    setTimeout(() => showDashboard(data.user), 1000);
                } else {
                    showAlert('login', data.message || 'Invalid credentials', true);
                }
            } catch (error) {
                showAlert('login', 'Error: Cannot connect to backend', true);
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = 'Login';
            }
        }

        // Handle register
        async function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;
            const btn = document.getElementById('registerBtn');

            if (!email || !username || !password || !password2) {
                showAlert('register', 'Please fill all fields', true);
                return;
            }

            if (password !== password2) {
                showAlert('register', 'Passwords do not match', true);
                return;
            }

            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span>Registering...';

            try {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('username', username);
                formData.append('password', password);

                const response = await fetch(`${BACKEND_URL}/users/register/`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('register', 'Registration successful! Please login.', false);
                    setTimeout(() => toggleForms('login'), 2000);
                } else {
                    showAlert('register', data.message || 'Registration failed', true);
                }
            } catch (error) {
                showAlert('register', 'Error: Cannot connect to backend', true);
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = 'Register';
            }
        }

        // Show dashboard
        function showDashboard(user) {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <h1>Welcome ${user.username}!</h1>
                <div class="user-info">
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>User ID:</strong> ${user.id}</p>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            `;
        }

        // Handle logout
        function handleLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            location.reload();
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            const user = localStorage.getItem('user');
            if (token && user) {
                showDashboard(JSON.parse(user));
            }
        });
    </script>
</body>
</html>
